name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Shell syntax
        run: bash -n bin/mossferry bin/repo-session install.sh
      - name: Tests
        run: bash tests/run.sh
